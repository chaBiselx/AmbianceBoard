{% extends 'Html/partial/structure/base.html' %}
{% load SoundBoard %}

{% block page_title %}Mes Soundboards Ambiance | AmbianceBoard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="flex-container" data-shepherd="my-soundboards-grid">
            {% for soundboard in soundboards %}
            <a href="{% url 'soundboardsRead' soundboard.uuid %}">
                <div class="soundboard-element flex-item soundboard-dim-{{ soundboard_dim }} m-1" style="background-color: {{ soundboard.color }};color: {{ soundboard.colorText }};">
                    {{ soundboard | applys_soundboard_content}}
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</div>


<div>
    <a class="btn btn-primary btn-block" href="{% url 'soundboardsNew' %}" data-shepherd="create-soundboard-btn">Ajouter un Soundboard</a>
</div>
{% endblock %}
