{% load Playlist %}

<div class="flex-item">
    {% with playlist_data=playlist|get_playlist_data %}
    <div class="playlist-link {% if master == False %} disabled {% endif %}{% if owner == False %}reportable{% endif %} playlist-element  playlist-dim-{{ playlist_dim }} m-1" id='playlist-{{ playlist.uuid }}'
        style="background-color: {{playlist.get_color}};color: {{playlist.get_color_text}};" data-id='{{ playlist.uuid }}'
        data-playlist-uri="{% if master == True %}{% if owner == True %}{% url 'streamMusic' soundboard.uuid  playlist.uuid %}{% else %}{% url 'publicStreamMusic' soundboard.uuid  playlist.uuid %}{% endif %}{% endif %}" {% for key, value in playlist_data.items %}
        data-playlist-{{ key }}="{{ value }}" {% endfor %} data-last-activation="0">
        {{ playlist | applys_playlist_content}}
    </div>
    {% endwith %}
    <form class="mixer-playlist-update-container hide-playlist-mixer">
        <input class="mixer-playlist-update horizontal-slider-input" type="range" value="{{playlist.volume}}" min="0" max="100" id="range_volume_{{ playlist.uuid }}" {% if owner == True %} data-playlistupdatevolumeuri="{% url 'update_direct_volume' playlist.uuid %}" {% endif %}
            data-defaultvolume="{{ playlist.volume }}" data-idplaylist="{{ playlist.uuid }}" />
        <output class="horizontal-slider-output bottom" for="range_volume_{{ playlist.uuid}}" style="--min: 0;--max: 100"></output>
    </form>
    <div class="js-specific-music specific-music-block d-none" data-playlist-id="{{ playlist.uuid }}">
        <div class="specific-music-container">
            <div class="specific-music-list"></div>
        </div>
    </div>
    <div class="margin-specific-music js-margin-specific-music d-none"></div>
</div>
