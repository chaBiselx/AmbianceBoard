{% load static %}
{% load SoundBoard %}

{% block content %}

{% if list_shortcut_keyboard|length > 0 %}
<div class="accordion fullScreen-element" id="accordionShortCutSoundboard">
    <div class="accordion-item">
        <h2 class="accordion-header" id="shortcut-listing-heading">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#shortcut-listing-collapse" aria-expanded="false" aria-controls="shortcut-listing-collapse">
                Afficher les raccourcis clavier
            </button>
        </h2>
        <div id="shortcut-listing-collapse" class="accordion-collapse collapse" aria-labelledby="shortcut-listing-heading">
            <div class="accordion-body">
                <div class="row" id="list-shortcut-keyboard">
                    {% for S_P in list_shortcut_keyboard %}
                    <div class="col" style="min-width: 120px;">
                        <small class="shortcut-element" data-shortcut="{{ S_P.shortcut_keyboard|join:'##' }}" data-playlist-uuid="{{ S_P.Playlist.uuid }}">
                            {{ S_P.shortcut_keyboard|join:" + " }} :
                            <button class="playlist-link playlist-element flex-item playlist-dim-50 m-1 " style="background-color: {{S_P.Playlist.get_color}}; color: {{S_P.Playlist.get_color_text}};">
                                {{ S_P.Playlist | applys_soundboard_content}}
                            </button></small>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endif %}


{% endblock  %}
