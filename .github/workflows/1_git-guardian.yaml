name: git-guardian
run-name: git guardian | ${{ github.actor }}

on: 
  - push
  # - pull_request
  # - workflow_dispatch

concurrency:
  group: git-guardian-${{ github.ref }}
  cancel-in-progress: true

jobs:
  GitGuardian:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install ggshield
      run: 'pip install --only-binary :all: ggshield==1.52.2'

    - name: GitGuardian scan pushed commits (history)
      env:
        GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
      run: ggshield --config-path .github/gitguardian.yaml secret scan ci

    - name: GitGuardian scan full repository (working tree)
      shell: bash
      env:
        GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
      run: |
        ggshield --config-path .github/gitguardian.yaml secret scan path --recursive --yes . 2>&1 | tee ggshield-report.txt
        exit ${PIPESTATUS[0]}

